openapi: '3.0.2'
info:
  title: Quotation API
  version: '1.1.0'
  contact:
    email: bayer@predic8.de
  description: Quotation API 4 Quotes
servers:
  - url: https://api.predic8.de/rfq/v1
tags:
  - name: RFQ
paths:
  /rfqs:
    post:
      tags:
        - RFQ
      operationId: creatQuote
      description: Create a Quote
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Quotation"
      responses:
        '200':
          description: OK

components:
  schemas:
    Quotation:
      type: object
      additionalProperties: false
      required:
        - id
        - product
      properties:
        id:
          type: string
          format: uuid
        product:
          type: string
          maxLength: 20
          pattern: '(\w+\W*)*'
        quantity:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
        shipment:
          type: string
          enum:
            - FOB
            - DAT