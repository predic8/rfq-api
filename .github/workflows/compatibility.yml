name: Check Compatibility

on:
  - pull_request

env:
  RULES_VERSION: v7

jobs:
  Compatibility-Check:
    name: Check Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '^1.20.3'
      - run: go install github.com/tufin/oasdiff@latest
      - name: Check version compatibility
        run: oasdiff -check-breaking -fail-on-diff -base rfq-api-v1-ref.oas.yml -revision  rfq-api-v1.oas.yml

